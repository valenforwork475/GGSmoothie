<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GG Back Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#2563eb;--blue-dark:#1d4ed8;--blue-soft:#e8f0fe;--ink:#111827;--muted:#64748b;--line:#dbe2ea;--bg:#f4f6f9;--card:#fff;--danger:#b91c1c;--success:#15803d;--shadow:0 8px 28px rgba(15,23,42,.08);--r:12px}
    *{box-sizing:border-box}body{margin:0;font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .login{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 15% 15%,rgba(96,165,250,.22),transparent 34%),linear-gradient(145deg,#0f172a,#172554 52%,#1e3a8a)}
    .login-card{width:min(430px,100%);background:#fff;border:1px solid rgba(255,255,255,.7);border-radius:18px;padding:30px;box-shadow:0 30px 80px rgba(15,23,42,.5)}.brand{display:flex;align-items:center;gap:12px}.brand-mark{width:42px;height:42px;border-radius:12px;background:var(--blue);box-shadow:inset 0 0 0 10px #fff;border:2px solid var(--blue)}.brand-title{font-size:20px;font-weight:900}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}.login h1{font-size:25px;margin:28px 0 6px}.login p{margin:0 0 22px;color:var(--muted);line-height:1.6}.field{display:block;margin-top:14px}.field span{display:block;font-size:12px;font-weight:800;margin-bottom:7px}.input{width:100%;min-height:46px;border:1px solid #cbd5e1;border-radius:9px;padding:10px 12px;background:#fff;color:var(--ink);outline:none}.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.primary{border:0;border-radius:9px;min-height:46px;padding:10px 16px;background:var(--blue);color:#fff;font-weight:850}.primary:hover{background:var(--blue-dark)}.login .primary{width:100%;margin-top:20px}.error{margin-top:12px;padding:10px 12px;border-radius:8px;background:#fef2f2;color:var(--danger);font-size:12px;font-weight:700}.demo-note{margin-top:16px;padding:11px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;color:#1e40af;font-size:11.5px;line-height:1.55}
    .app{min-height:100vh;display:grid;grid-template-columns:228px minmax(0,1fr)}.sidebar{position:sticky;top:0;height:100vh;background:#0f172a;color:#e2e8f0;padding:18px 14px;display:flex;flex-direction:column}.sidebar .brand{padding:2px 8px 20px;border-bottom:1px solid rgba(255,255,255,.1)}.sidebar .brand-mark{box-shadow:inset 0 0 0 9px #0f172a}.sidebar .brand-sub{color:#94a3b8}.nav{display:grid;gap:5px;margin-top:18px}.nav button{border:1px solid transparent;background:transparent;color:#cbd5e1;text-align:left;padding:11px 12px;border-radius:9px;font-weight:700}.nav button:hover{background:rgba(255,255,255,.06)}.nav button.active{background:#fff;color:#1d4ed8}.user-box{margin-top:auto;padding:13px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.04)}.user-name{font-weight:800;color:#fff}.user-role{font-size:11px;color:#93c5fd;text-transform:uppercase;margin-top:2px}.logout{width:100%;margin-top:10px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:transparent;color:#e2e8f0;padding:8px;font-weight:700}
    .main{min-width:0}.topbar{height:66px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:10}.page-kicker{font-size:11px;color:var(--muted);font-weight:800}.page-title{font-size:18px;font-weight:900;margin-top:1px}.live{padding:6px 10px;border-radius:999px;background:#dcfce7;color:#166534;font-size:11px;font-weight:800}.content{padding:22px;max-width:1500px;margin:0 auto}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px}.stat-label{font-size:12px;color:var(--muted);font-weight:700}.stat-value{font-size:28px;font-weight:900;margin-top:7px}.stat-note{font-size:11px;color:var(--muted);margin-top:5px}.panel{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:0 2px 8px rgba(15,23,42,.04)}.panel-head{min-height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}.panel-title{font-size:15px;font-weight:900}.panel-sub{font-size:11px;color:var(--muted);margin-top:2px}.panel-body{padding:16px}.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.secondary{border:1px solid #cbd5e1;border-radius:9px;min-height:40px;padding:8px 13px;background:#fff;color:#334155;font-weight:800}.secondary:hover{background:#f8fafc}.danger{color:var(--danger)}
    .table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:760px}.table th{text-align:left;padding:10px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line)}.table td{padding:12px;border-bottom:1px solid #edf0f3;vertical-align:middle}.table tr:last-child td{border-bottom:0}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:10.5px;font-weight:850;background:#e2e8f0;color:#334155}.badge.owner{background:#ede9fe;color:#6d28d9}.badge.manager{background:#dbeafe;color:#1d4ed8}.badge.cashier{background:#f1f5f9;color:#475569}.badge.active{background:#dcfce7;color:#166534}.badge.inactive{background:#fee2e2;color:#991b1b}.row-input{min-height:38px;border:1px solid #d5dce4;border-radius:7px;padding:7px 9px;background:#fff;min-width:100px}.menu-name{min-width:170px}.menu-desc{min-width:250px}.empty{padding:40px;text-align:center;color:var(--muted)}.loading{opacity:.55;pointer-events:none}.demo-banner{margin-bottom:14px;padding:11px 14px;border:1px solid #fbbf24;border-radius:9px;background:#fffbeb;color:#92400e;font-size:12px;font-weight:700}
    .modal{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;background:rgba(15,23,42,.55)}.modal-card{width:min(520px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:14px;padding:22px;box-shadow:0 30px 80px rgba(15,23,42,.3)}.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:center}.modal-title{font-size:18px;font-weight:900}.close{width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:18px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}.toast{position:fixed;right:20px;bottom:20px;z-index:80;max-width:380px;padding:12px 15px;border-radius:10px;background:#111827;color:#fff;box-shadow:var(--shadow);font-weight:700}.toast.bad{background:#991b1b}
    @media(max-width:1000px){.grid4{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.nav{grid-template-columns:repeat(4,1fr)}.nav button{text-align:center;padding:9px 4px;font-size:11px}.user-box{margin-top:14px}.topbar{position:static}.content{padding:14px}.grid4{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}@media(max-width:480px){.grid4{grid-template-columns:1fr}.topbar{padding:0 14px}}
  </style>
</head>
<body>
  <section id="loginView" class="login">
    <form id="loginForm" class="login-card">
      <div class="brand"><div class="brand-mark"></div><div><div class="brand-title">GG Back Office</div><div class="brand-sub">Management & Operations</div></div></div>
      <h1>เข้าสู่ระบบหลังบ้าน</h1><p>สำหรับเจ้าของร้านและผู้จัดการเท่านั้น</p>
      <label class="field"><span>อีเมล</span><input id="loginEmail" class="input" type="text" autocomplete="username" required></label>
      <label class="field"><span>รหัสผ่าน</span><input id="loginPassword" class="input" type="password" autocomplete="current-password" required></label>
      <div id="loginError" class="error hidden"></div>
      <button id="loginButton" class="primary" type="submit">เข้าสู่ระบบ</button>
      <div class="demo-note">ทดลองหน้าระบบ: <b>12345</b> / <b>1234</b><br>โหมดทดลองดูหน้าจอได้ แต่จะไม่แก้ข้อมูลจริง</div>
    </form>
  </section>

  <div id="appView" class="app hidden">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"></div><div><div class="brand-title">GG Back Office</div><div class="brand-sub">Secure management</div></div></div>
      <nav class="nav" id="nav">
        <button data-screen="dashboard" class="active">ภาพรวม</button>
        <button data-screen="staff">พนักงาน</button>
        <button data-screen="menu">เมนู</button>
        <button data-screen="audit">ประวัติระบบ</button>
      </nav>
      <div class="user-box"><div id="userName" class="user-name">-</div><div id="userRole" class="user-role">-</div><button id="logoutButton" class="logout">ออกจากระบบ</button></div>
    </aside>
    <main class="main">
      <header class="topbar"><div><div class="page-kicker">GG SMOOTHIE</div><div id="pageTitle" class="page-title">ภาพรวม</div></div><div class="live">● เชื่อมต่อ Supabase</div></header>
      <div id="content" class="content"></div>
    </main>
  </div>

  <div id="staffModal" class="modal hidden">
    <form id="staffForm" class="modal-card">
      <div class="modal-head"><div><div class="modal-title">เพิ่มพนักงาน</div><div class="panel-sub">สร้างบัญชีผ่าน Backend ที่ปลอดภัย</div></div><button type="button" class="close" data-close-modal>×</button></div>
      <div class="form-grid">
        <label class="field"><span>ชื่อพนักงาน</span><input id="staffName" class="input" required minlength="2"></label>
        <label class="field"><span>ตำแหน่ง</span><select id="staffRoleInput" class="input"><option value="cashier">Cashier</option><option value="manager">Manager</option><option value="owner">Owner</option></select></label>
      </div>
      <label class="field"><span>อีเมล</span><input id="staffEmail" class="input" type="email" required></label>
      <label class="field"><span>รหัสผ่านเริ่มต้น (อย่างน้อย 8 ตัว)</span><input id="staffPassword" class="input" type="password" minlength="8" required></label>
      <div id="staffFormError" class="error hidden"></div>
      <div class="form-actions"><button type="button" class="secondary" data-close-modal>ยกเลิก</button><button id="staffSubmit" class="primary" type="submit">สร้างบัญชี</button></div>
    </form>
  </div>
  <div id="toast" class="toast hidden"></div>

<script>
const SB_URL='https://qsylglypfjxincexteqy.supabase.co';
const SB_KEY='sb_publishable_BFsUTvD1T7gt9cwDC0tMGw_EY48x4EP';
const DEMO_USER='12345',DEMO_PASSWORD='1234';
let accessToken='',currentUser=null,currentStaff=null,isDemo=false,currentScreen='dashboard';
let staffRows=[],menuRows=[],auditRows=[],dashboardData={orders:[],staff:[],menu:[]};
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const money=n=>'฿'+Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
function toast(message,bad=false){const el=$('toast');el.textContent=message;el.className='toast'+(bad?' bad':'');setTimeout(()=>el.classList.add('hidden'),3000)}
function setBusy(el,busy,label){el.disabled=busy;if(label)el.textContent=label}
async function api(path,{method='GET',body,token=accessToken}={}){const headers={apikey:SB_KEY,'Content-Type':'application/json'};if(token)headers.Authorization='Bearer '+token;const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers,body:body===undefined?undefined:JSON.stringify(body)});const text=await r.text();if(!r.ok)throw new Error((()=>{try{return JSON.parse(text).message||JSON.parse(text).error}catch{return text||('HTTP '+r.status)}})());return text?JSON.parse(text):null}
async function edge(body){const r=await fetch(SB_URL+'/functions/v1/admin-staff',{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||'ดำเนินการไม่สำเร็จ');return data}
function roleBadge(role){return '<span class="badge '+esc(role)+'">'+esc(role)+'</span>'}
function showApp(){ $('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('userName').textContent=currentStaff.display_name||currentStaff.email||'ผู้ใช้งาน';$('userRole').textContent=currentStaff.role;renderScreen() }
async function login(email,password){if(email===DEMO_USER&&password===DEMO_PASSWORD){isDemo=true;currentUser={id:'demo-owner'};currentStaff={uid:'demo-owner',display_name:'Demo Owner',email:'demo@gg.local',role:'owner',active:true};showApp();return}
  const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password})});const auth=await r.json();if(!r.ok||!auth.access_token)throw new Error(auth.error_description||auth.msg||'อีเมลหรือรหัสผ่านไม่ถูกต้อง');accessToken=auth.access_token;currentUser=auth.user;
  const rows=await api('staff?uid=eq.'+encodeURIComponent(auth.user.id)+'&select=uid,email,display_name,role,active');const staff=rows&&rows[0];if(!staff||!staff.active||!['manager','owner'].includes(staff.role)){accessToken='';throw new Error('บัญชีนี้ไม่มีสิทธิ์เข้า Back Office')};currentStaff=staff;showApp()}
function logout(){accessToken='';currentUser=null;currentStaff=null;isDemo=false;staffRows=[];menuRows=[];auditRows=[];$('appView').classList.add('hidden');$('loginView').classList.remove('hidden');$('loginForm').reset()}
function demoBanner(){return isDemo?'<div class="demo-banner">โหมดทดลอง — ดูหน้าจอได้ แต่ระบบจะไม่แก้ข้อมูลจริง</div>':''}
async function loadDashboard(){if(isDemo){dashboardData={orders:[{id:'1',total:258,status:'confirmed',pay_method:'cash'},{id:'2',total:139,status:'making',pay_method:'promptpay'}],staff:[currentStaff,{uid:'d2',display_name:'Demo Cashier',role:'cashier',active:true}],menu:await publicMenu()};return}
  const start=new Date();start.setHours(0,0,0,0);const q=encodeURIComponent(start.toISOString());const [orders,staff,menu]=await Promise.all([api('orders?created_at=gte.'+q+'&select=id,total,status,pay_method,created_at'),api('staff?select=uid,email,display_name,role,active,updated_at&order=display_name.asc'),api('menu_items?select=id,name,active,price')]);dashboardData={orders:orders||[],staff:staff||[],menu:menu||[]}}
async function publicMenu(){return api('menu_items?active=eq.true&order=sort_order.asc&select=id,name,description,price,active,cal,p,f,sug',{token:''})}
function dashboardHtml(){const orders=dashboardData.orders||[],staff=dashboardData.staff||[],menu=dashboardData.menu||[];const sales=orders.reduce((n,o)=>n+Number(o.total||0),0);const pending=orders.filter(o=>!['done','cancelled'].includes(o.status)).length;return demoBanner()+'<div class="grid4"><div class="stat"><div class="stat-label">ยอดขายวันนี้</div><div class="stat-value">'+money(sales)+'</div><div class="stat-note">จากออเดอร์ทุกช่องทาง</div></div><div class="stat"><div class="stat-label">ออเดอร์วันนี้</div><div class="stat-value">'+orders.length+'</div><div class="stat-note">กำลังดำเนินการ '+pending+'</div></div><div class="stat"><div class="stat-label">เมนูที่ขายอยู่</div><div class="stat-value">'+menu.filter(m=>m.active).length+'</div><div class="stat-note">เชื่อมกับเว็บสั่งออนไลน์</div></div><div class="stat"><div class="stat-label">พนักงานใช้งาน</div><div class="stat-value">'+staff.filter(s=>s.active).length+'</div><div class="stat-note">Owner / Manager / Cashier</div></div></div><section class="panel"><div class="panel-head"><div><div class="panel-title">สถานะระบบ</div><div class="panel-sub">ข้อมูลหลักเชื่อมผ่าน Supabase</div></div></div><div class="panel-body"><div class="grid4"><div><b>เมนูออนไลน์</b><div class="stat-note">พร้อมใช้งาน</div></div><div><b>POS หน้าร้าน</b><div class="stat-note">พร้อมเชื่อมต่อ</div></div><div><b>ระบบพนักงาน</b><div class="stat-note">ควบคุมตามตำแหน่ง</div></div><div><b>Audit Log</b><div class="stat-note">บันทึกการเปลี่ยนแปลง</div></div></div></div></section>'}
async function loadStaff(){if(isDemo){staffRows=[currentStaff,{uid:'d2',email:'cashier@gg.local',display_name:'Demo Cashier',role:'cashier',active:true},{uid:'d3',email:'manager@gg.local',display_name:'Demo Manager',role:'manager',active:false}];return}staffRows=await api('staff?select=uid,email,display_name,role,active,updated_at&order=display_name.asc')||[]}
function staffHtml(){const rows=staffRows.map(s=>'<tr data-staff="'+esc(s.uid)+'"><td><input class="row-input staff-name" value="'+esc(s.display_name||'')+'"><div class="stat-note">'+esc(s.email||'ยังไม่มีอีเมล')+'</div></td><td><select class="row-input staff-role"><option value="cashier" '+(s.role==='cashier'?'selected':'')+'>Cashier</option><option value="manager" '+(s.role==='manager'?'selected':'')+'>Manager</option><option value="owner" '+(s.role==='owner'?'selected':'')+'>Owner</option></select></td><td><label><input class="staff-active" type="checkbox" '+(s.active?'checked':'')+'> '+(s.active?'<span class="badge active">ใช้งาน</span>':'<span class="badge inactive">ระงับ</span>')+'</label></td><td>'+roleBadge(s.role)+'</td><td><button class="secondary save-staff">บันทึก</button></td></tr>').join('');return demoBanner()+'<section class="panel" style="margin-top:0"><div class="panel-head"><div><div class="panel-title">พนักงานและสิทธิ์</div><div class="panel-sub">เฉพาะ Owner/Manager จัดการได้</div></div><button id="addStaffButton" class="primary">+ เพิ่มพนักงาน</button></div><div class="table-wrap"><table class="table"><thead><tr><th>พนักงาน</th><th>ตำแหน่ง</th><th>สถานะ</th><th>สิทธิ์ปัจจุบัน</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></section>'}
async function loadMenu(){menuRows=isDemo?await publicMenu():await api('menu_items?select=id,name,description,price,active,cal,p,f,sug,sort_order&order=sort_order.asc,id.asc')||[]}
function menuHtml(){const rows=menuRows.map(m=>'<tr data-menu="'+esc(m.id)+'"><td><input class="row-input menu-name" value="'+esc(m.name)+'"></td><td><input class="row-input menu-desc" value="'+esc(m.description||'')+'"></td><td><input class="row-input menu-price" type="number" min="0" value="'+esc(m.price)+'"></td><td><input class="row-input menu-cal" type="number" min="0" value="'+esc(m.cal||0)+'"></td><td><label><input class="menu-active" type="checkbox" '+(m.active?'checked':'')+'> '+(m.active?'<span class="badge active">ขาย</span>':'<span class="badge inactive">ปิด</span>')+'</label></td><td><button class="secondary save-menu">บันทึก</button></td></tr>').join('');return demoBanner()+'<section class="panel" style="margin-top:0"><div class="panel-head"><div><div class="panel-title">เมนูกลาง</div><div class="panel-sub">แก้ตรงนี้แล้ว POS และเว็บสั่งออนไลน์ใช้ข้อมูลเดียวกัน</div></div><button id="addMenuButton" class="primary">+ เพิ่มเมนู</button></div><div class="table-wrap"><table class="table"><thead><tr><th>ชื่อเมนู</th><th>รายละเอียด</th><th>ราคา</th><th>แคลอรี</th><th>สถานะ</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></section>'}
async function loadAudit(){if(isDemo){auditRows=[{id:1,action:'staff.create',entity_type:'staff',entity_id:'demo',created_at:new Date().toISOString(),detail:{role:'cashier'}},{id:2,action:'menu.update',entity_type:'menu_item',entity_id:'g',created_at:new Date().toISOString(),detail:{price:129}}];return}auditRows=await api('audit_log?select=id,action,entity_type,entity_id,detail,created_at&order=created_at.desc&limit=100')||[]}
function auditHtml(){const rows=auditRows.map(a=>'<tr><td>'+new Date(a.created_at).toLocaleString('th-TH')+'</td><td><b>'+esc(a.action)+'</b></td><td>'+esc(a.entity_type)+'</td><td>'+esc(a.entity_id||'-')+'</td><td><code>'+esc(JSON.stringify(a.detail||{}))+'</code></td></tr>').join('');return demoBanner()+'<section class="panel" style="margin-top:0"><div class="panel-head"><div><div class="panel-title">ประวัติระบบ</div><div class="panel-sub">100 รายการล่าสุด</div></div><button id="refreshAudit" class="secondary">รีเฟรช</button></div><div class="table-wrap"><table class="table"><thead><tr><th>เวลา</th><th>เหตุการณ์</th><th>ประเภท</th><th>รายการ</th><th>รายละเอียด</th></tr></thead><tbody>'+rows+'</tbody></table></div></section>'}
async function renderScreen(){currentScreen=currentScreen||'dashboard';$('pageTitle').textContent={dashboard:'ภาพรวม',staff:'พนักงานและสิทธิ์',menu:'จัดการเมนู',audit:'ประวัติระบบ'}[currentScreen];document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===currentScreen));$('content').innerHTML='<div class="empty">กำลังโหลด...</div>';
 try{if(currentScreen==='dashboard'){await loadDashboard();$('content').innerHTML=dashboardHtml()}else if(currentScreen==='staff'){await loadStaff();$('content').innerHTML=staffHtml()}else if(currentScreen==='menu'){await loadMenu();$('content').innerHTML=menuHtml()}else{await loadAudit();$('content').innerHTML=auditHtml()}bindScreen()}catch(e){$('content').innerHTML='<div class="error">'+esc(e.message)+'</div>'}}
function bindScreen(){const addStaff=$('addStaffButton');if(addStaff)addStaff.onclick=()=>{$('staffForm').reset();$('staffFormError').classList.add('hidden');$('staffModal').classList.remove('hidden')};const addMenu=$('addMenuButton');if(addMenu)addMenu.onclick=addMenuItem;const refresh=$('refreshAudit');if(refresh)refresh.onclick=renderScreen;
 document.querySelectorAll('.save-staff').forEach(btn=>btn.onclick=()=>saveStaffRow(btn.closest('tr')));document.querySelectorAll('.save-menu').forEach(btn=>btn.onclick=()=>saveMenuRow(btn.closest('tr')))}
async function saveStaffRow(tr){if(isDemo)return toast('โหมดทดลองไม่แก้ข้อมูลจริง');const body={action:'update',uid:tr.dataset.staff,display_name:tr.querySelector('.staff-name').value.trim(),role:tr.querySelector('.staff-role').value,active:tr.querySelector('.staff-active').checked};try{await edge(body);toast('บันทึกพนักงานแล้ว');await renderScreen()}catch(e){toast(e.message,true)}}
async function saveMenuRow(tr){if(isDemo)return toast('โหมดทดลองไม่แก้ข้อมูลจริง');const body={name:tr.querySelector('.menu-name').value.trim(),description:tr.querySelector('.menu-desc').value.trim(),price:Number(tr.querySelector('.menu-price').value),cal:Number(tr.querySelector('.menu-cal').value),active:tr.querySelector('.menu-active').checked,updated_at:new Date().toISOString()};try{await api('menu_items?id=eq.'+encodeURIComponent(tr.dataset.menu),{method:'PATCH',body});toast('อัปเดตเมนูแล้ว — เว็บออนไลน์จะตามภายใน 30 วินาที')}catch(e){toast(e.message,true)}}
async function addMenuItem(){if(isDemo)return toast('โหมดทดลองไม่แก้ข้อมูลจริง');const id='p'+Date.now().toString(36);try{await api('menu_items',{method:'POST',body:{id,name:'เมนูใหม่',description:'',price:0,active:false,sort_order:menuRows.length+1}});toast('เพิ่มเมนูใหม่แล้ว');await renderScreen()}catch(e){toast(e.message,true)}}
$('loginForm').addEventListener('submit',async e=>{e.preventDefault();const btn=$('loginButton'),err=$('loginError');err.classList.add('hidden');setBusy(btn,true,'กำลังเข้าสู่ระบบ...');try{await login($('loginEmail').value.trim(),$('loginPassword').value)}catch(ex){err.textContent=ex.message;err.classList.remove('hidden')}finally{setBusy(btn,false,'เข้าสู่ระบบ')}});
$('logoutButton').onclick=logout;$('nav').onclick=e=>{const b=e.target.closest('button[data-screen]');if(!b)return;currentScreen=b.dataset.screen;renderScreen()};document.querySelectorAll('[data-close-modal]').forEach(b=>b.onclick=()=>$('staffModal').classList.add('hidden'));
$('staffForm').addEventListener('submit',async e=>{e.preventDefault();const err=$('staffFormError'),btn=$('staffSubmit');err.classList.add('hidden');if(isDemo){$('staffModal').classList.add('hidden');return toast('โหมดทดลองไม่สร้างบัญชีจริง')}setBusy(btn,true,'กำลังสร้าง...');try{await edge({action:'create',display_name:$('staffName').value.trim(),role:$('staffRoleInput').value,email:$('staffEmail').value.trim(),password:$('staffPassword').value});$('staffModal').classList.add('hidden');toast('สร้างบัญชีพนักงานแล้ว');await renderScreen()}catch(ex){err.textContent=ex.message;err.classList.remove('hidden')}finally{setBusy(btn,false,'สร้างบัญชี')}});
</script>
</body>
</html>
