document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-weight: 700;\n  font-display: swap;\n  src: url(\"1e148994-2689-4b0f-90a7-95181cc923a0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"aba4f87c-8f24-47ef-a0ad-7b676a468ebb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{ box-sizing:border-box; margin:0; padding:0; }\n    body{ background:#EAF2E2; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#EAF2E2; color:#1B3325; font-family:'Anuphan', system-ui, sans-serif; display:flex; flex-direction:column; align-items:center;\">\n\n  <!-- header -->\n  <header style=\"width:100%; background:#1B3325; color:#EAF2E2;\">\n    <div style=\"max-width:520px; margin:0 auto; padding:18px clamp(20px,5vw,28px); display:flex; align-items:center; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:baseline; gap:9px;\">\n        <span style=\"font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:20px; letter-spacing:-0.02em;\">GG Smoothie<\u002Fspan>\n        <span style=\"width:8px; height:8px; border-radius:50%; background:#A7DA4E; display:inline-block;\"><\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:13px; color:rgba(234,242,226,0.65); letter-spacing:0.02em;\">บัตรสมาชิก<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"width:100%; max-width:520px; padding:clamp(22px,5vw,34px) clamp(20px,5vw,28px) 64px; flex:1;\">\n\n    <!-- ============ NOT A MEMBER : register ============ -->\n    <sc-if value=\"{{ notMember }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center; margin:14px 0 26px;\">\n        <div style=\"width:74px; height:74px; margin:0 auto 18px; border-radius:50%; background:#1B3325; display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A7DA4E\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 2h12l-1 6a5 5 0 0 1-10 0Z\"><\u002Fpath><path d=\"M6 8h12\"><\u002Fpath><path d=\"M9 14h6l-.7 6.3a1.5 1.5 0 0 1-1.5 1.7h-.6a1.5 1.5 0 0 1-1.5-1.7Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h1 style=\"font-size:clamp(26px,7vw,34px); font-weight:700; line-height:1.15; margin-bottom:10px;\">สะสม 10 แก้ว ฟรี 1<\u002Fh1>\n        <p style=\"font-size:15px; line-height:1.7; color:#46463e;\">สมัครสมาชิก GGSmoothie เก็บแต้มทุกแก้ว แลกเครื่องดื่มฟรีได้เลย<\u002Fp>\n      <\u002Fdiv>\n\n      <form onsubmit=\"{{ registerMember }}\" style=\"background:#fff; border:1px solid rgba(20,21,15,0.1); border-radius:20px; padding:clamp(22px,5vw,30px); display:flex; flex-direction:column; gap:17px; box-shadow:0 18px 44px -28px rgba(27,51,37,0.45);\">\n        <div style=\"font-size:18px; font-weight:700;\">สมัครสมาชิกฟรี<\u002Fdiv>\n        <label style=\"display:flex; flex-direction:column; gap:7px;\">\n          <span style=\"font-size:13px; color:#5b6b62;\">ชื่อ<\u002Fspan>\n          <input type=\"text\" value=\"{{ mName }}\" oninput=\"{{ onMName }}\" placeholder=\"ชื่อของคุณ\" style=\"font-family:'Anuphan', system-ui, sans-serif; font-size:16px; padding:14px 15px; border-radius:12px; border:1px solid rgba(20,21,15,0.16); background:#fff; color:#1B3325; outline:none;\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:7px;\">\n          <span style=\"font-size:13px; color:#5b6b62;\">เบอร์โทร<\u002Fspan>\n          <input type=\"tel\" value=\"{{ mPhone }}\" oninput=\"{{ onMPhone }}\" placeholder=\"08x-xxx-xxxx\" style=\"font-family:'Anuphan', system-ui, sans-serif; font-size:16px; padding:14px 15px; border-radius:12px; border:1px solid rgba(20,21,15,0.16); background:#fff; color:#1B3325; outline:none;\">\n        <\u002Flabel>\n        <label style=\"display:flex; flex-direction:column; gap:7px;\">\n          <span style=\"font-size:13px; color:#5b6b62;\">วันเกิด <span style=\"color:#8a978d;\">(รับฟรี 1 แก้วในเดือนเกิด)</span></span>\n          <input type=\"date\" value=\"{{ mDob }}\" oninput=\"{{ onMDob }}\" style=\"font-family:'Anuphan', system-ui, sans-serif; font-size:16px; padding:14px 15px; border-radius:12px; border:1px solid rgba(20,21,15,0.16); background:#fff; color:#1B3325; outline:none;\">\n        </label>\n        <sc-if value=\"{{ canRegister }}\" hint-placeholder-val=\"{{ true }}\"><button type=\"submit\" style=\"background:#1B3325; color:#EAF2E2; border:none; cursor:pointer; font-family:'Anuphan', system-ui, sans-serif; font-size:16px; font-weight:700; padding:16px; border-radius:13px; transition:all .2s ease;\" style-hover=\"background:#A7DA4E; color:#1B3325;\">สมัครสมาชิก<\u002Fbutton><\u002Fsc-if>\n        <sc-if value=\"{{ cannotRegister }}\"><button type=\"button\" disabled=\"disabled\" style=\"background:rgba(20,21,15,0.08); color:rgba(20,21,15,0.35); border:none; cursor:not-allowed; font-family:'Anuphan', system-ui, sans-serif; font-size:16px; font-weight:700; padding:16px; border-radius:13px;\">กรอกชื่อและเบอร์โทร<\u002Fbutton><\u002Fsc-if>\n        <div style=\"font-size:11px; color:#9aa79e; text-align:center; line-height:1.7;\">ข้อมูลบันทึกในเครื่องนี้ · ฟรี ไม่มีค่าใช้จ่าย<\u002Fdiv>\n      <\u002Fform>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:22px;\">\n        <div style=\"background:#fff; border:1px solid rgba(20,21,15,0.08); border-radius:14px; padding:16px 10px; text-align:center;\"><div style=\"font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:500; color:#2FA05E;\">10<\u002Fdiv><div style=\"font-size:11px; color:#7a796f; margin-top:4px; line-height:1.5;\">แก้ว ฟรี 1<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(20,21,15,0.08); border-radius:14px; padding:16px 10px; text-align:center;\"><div style=\"font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:500; color:#2FA05E;\">0฿<\u002Fdiv><div style=\"font-size:11px; color:#7a796f; margin-top:4px; line-height:1.5;\">ค่าสมัคร<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid rgba(20,21,15,0.08); border-radius:14px; padding:16px 10px; text-align:center;\"><div style=\"font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:500; color:#2FA05E;\">∞<\u002Fdiv><div style=\"font-size:11px; color:#7a796f; margin-top:4px; line-height:1.5;\">สะสมไม่จำกัด<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ IS A MEMBER : loyalty card ============ -->\n    <sc-if value=\"{{ isMember }}\">\n      <div style=\"background:#1B3325; color:#EAF2E2; border-radius:24px; padding:clamp(24px,5vw,32px); position:relative; overflow:hidden; box-shadow:0 22px 50px -26px rgba(27,51,37,0.6);\">\n        <div style=\"position:absolute; top:-90px; right:-70px; width:280px; height:280px; border-radius:50%; background:rgba(167,218,78,0.1);\"><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:16px; position:relative;\">\n          <div>\n            <div style=\"font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14px; letter-spacing:0.02em; color:#A7DA4E;\">GG Smoothie<\u002Fdiv>\n            <div style=\"font-size:23px; font-weight:700; margin-top:6px;\">{{ memberName }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono', monospace; font-size:13px; color:rgba(234,242,226,0.6); margin-top:3px;\">{{ memberPhone }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right; flex:none;\">\n            <div style=\"font-family:'JetBrains Mono', monospace; font-size:38px; font-weight:500; color:#A7DA4E; line-height:1;\">{{ stampsCount }}<span style=\"font-size:19px; color:rgba(234,242,226,0.5);\">/{{ goalCount }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12px; color:rgba(234,242,226,0.6); margin-top:4px;\">แก้วที่สะสม<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:11px; margin:26px 0 4px; position:relative;\">\n          <sc-for list=\"{{ stampCells }}\" as=\"cell\" hint-placeholder-count=\"10\">\n            <div style=\"{{ cell.cellStyle }}\">\n              <svg width=\"46%\" height=\"46%\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ cell.markColor }}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 2h12l-1 6a5 5 0 0 1-10 0Z\"><\u002Fpath><path d=\"M6 8h12\"><\u002Fpath><path d=\"M9 14h6l-.7 6.3a1.5 1.5 0 0 1-1.5 1.7h-.6a1.5 1.5 0 0 1-1.5-1.7Z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ rewardNotReady }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:22px; font-size:15px; color:rgba(234,242,226,0.85); position:relative;\">อีก <span style=\"color:#A7DA4E; font-weight:700;\">{{ remainingLabel }}<\u002Fspan> แก้ว รับฟรี 1 แก้ว!<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ rewardReady }}\">\n          <div style=\"margin-top:22px; background:#A7DA4E; color:#1B3325; border-radius:14px; padding:18px 20px; display:flex; flex-direction:column; gap:12px; position:relative;\">\n            <div style=\"font-weight:700; font-size:17px;\">🎉 ครบ 10 แก้วแล้ว! รับฟรี 1 แก้ว<\u002Fdiv>\n            <button onclick=\"{{ redeemReward }}\" style=\"background:#1B3325; color:#EAF2E2; border:none; cursor:pointer; font-family:'Anuphan', system-ui, sans-serif; font-size:15px; font-weight:700; padding:14px; border-radius:11px; transition:all .2s ease;\" style-hover=\"background:#0f1f16;\">ใช้สิทธิ์ฟรี 1 แก้ว<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:22px; padding-top:20px; border-top:1px solid rgba(234,242,226,0.14); position:relative;\">\n          <button onclick=\"{{ addStamp }}\" style=\"background:rgba(255,255,255,0.08); color:#EAF2E2; border:1px solid rgba(234,242,226,0.2); cursor:pointer; font-family:'Anuphan', system-ui, sans-serif; font-size:13px; font-weight:500; padding:10px 16px; border-radius:10px; transition:all .2s ease;\" style-hover=\"background:rgba(255,255,255,0.16);\">+ ประทับตรา (ทดลอง)<\u002Fbutton>\n          <sc-if value=\"{{ hasRedeemed }}\"><div style=\"font-size:12px; color:rgba(234,242,226,0.55);\">ใช้สิทธิ์ฟรีไปแล้ว {{ redeemedLabel }} ครั้ง<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- how to earn -->\n      <div style=\"background:#fff; border:1px solid rgba(20,21,15,0.08); border-radius:18px; padding:20px 22px; margin-top:18px;\">\n        <div style=\"font-size:15px; font-weight:700; margin-bottom:12px;\">วิธีสะสมแต้ม<\u002Fdiv>\n        <div style=\"display:flex; gap:11px; align-items:flex-start; margin-bottom:11px;\"><span style=\"flex:none; width:26px; height:26px; border-radius:50%; background:#EAF2E2; color:#1B3325; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500; display:flex; align-items:center; justify-content:center;\">1<\u002Fspan><div style=\"font-size:14px; line-height:1.6; color:#46463e;\">แสดงบัตรนี้ที่ร้านทุกครั้งที่ซื้อเครื่องดื่ม<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:11px; align-items:flex-start; margin-bottom:11px;\"><span style=\"flex:none; width:26px; height:26px; border-radius:50%; background:#EAF2E2; color:#1B3325; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500; display:flex; align-items:center; justify-content:center;\">2<\u002Fspan><div style=\"font-size:14px; line-height:1.6; color:#46463e;\">พนักงานประทับตราให้ 1 ดวงต่อ 1 แก้ว<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; width:26px; height:26px; border-radius:50%; background:#EAF2E2; color:#1B3325; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500; display:flex; align-items:center; justify-content:center;\">3<\u002Fspan><div style=\"font-size:14px; line-height:1.6; color:#46463e;\">ครบ 10 ดวง แลกเครื่องดื่มฟรีได้ทันที<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ signOutMember }}\" style=\"display:block; margin:18px auto 0; background:none; border:none; cursor:pointer; color:#7C8C83; font-family:'Anuphan', system-ui, sans-serif; font-size:13px; padding:6px;\" style-hover=\"color:#1B3325;\">ออกจากระบบสมาชิก<\u002Fbutton>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = { member: null, stamps: 0, redeemed: 0, mName: '', mPhone: '', mDob: '', _pulse: false };\n  STAMP_GOAL = 10;\n  componentDidMount() { this.loadMember(); }\n  loadMember() {\n    if (typeof window === 'undefined' || !window.localStorage) return;\n    try {\n      const raw = window.localStorage.getItem('gg_member');\n      if (raw) { const d = JSON.parse(raw); this.setState({ member: d.member || null, stamps: d.stamps || 0, redeemed: d.redeemed || 0 }); }\n    } catch (e) {}\n  }\n  saveMember(next) {\n    if (typeof window === 'undefined' || !window.localStorage) return;\n    try { window.localStorage.setItem('gg_member', JSON.stringify({ member: next.member, stamps: next.stamps, redeemed: next.redeemed })); } catch (e) {}\n  }\n  onMField(field) { return (e) => { const v = e.target.value; this.setState(field === 'name' ? { mName: v } : field === 'phone' ? { mPhone: v } : { mDob: v }); }; }\n  registerMember = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const name = (this.state.mName || '').trim();\n    const phone = (this.state.mPhone || '').trim();\n    if (!name || phone.length < 9) return;\n    const dob = (this.state.mDob || '').trim();\n    const member = { name, phone, dob };\n    this.setState({ member });\n    this.saveMember({ member, stamps: this.state.stamps, redeemed: this.state.redeemed });\n  };\n  addStamp = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    if (!this.state.member) return;\n    const stamps = Math.min(this.STAMP_GOAL, this.state.stamps + 1);\n    this.setState({ stamps });\n    this.saveMember({ member: this.state.member, stamps, redeemed: this.state.redeemed });\n  };\n  redeemReward = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    if (this.state.stamps < this.STAMP_GOAL) return;\n    const stamps = this.state.stamps - this.STAMP_GOAL;\n    const redeemed = this.state.redeemed + 1;\n    this.setState({ stamps, redeemed });\n    this.saveMember({ member: this.state.member, stamps, redeemed });\n  };\n  signOutMember = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    this.setState({ member: null, mName: '', mPhone: '', mDob: '' });\n    this.saveMember({ member: null, stamps: this.state.stamps, redeemed: this.state.redeemed });\n  };\n  stampCellStyle(filled, isNext) {\n    return {\n      aspectRatio: '1', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',\n      transition: 'all .25s ease',\n      background: filled ? '#A7DA4E' : '#fff',\n      border: filled ? '2px solid #A7DA4E' : (isNext ? '2px dashed #A7DA4E' : '2px solid rgba(27,51,37,0.12)'),\n      boxShadow: filled ? '0 6px 14px -6px rgba(27,51,37,0.5)' : 'none',\n    };\n  }\n  renderVals() {\n    const s = this.state;\n    const canReg = (s.mName || '').trim().length > 0 && (s.mPhone || '').trim().length >= 9;\n    return {\n      isMember: !!s.member, notMember: !s.member,\n      memberName: s.member ? s.member.name : '',\n      memberPhone: s.member ? s.member.phone : '',\n      mName: s.mName, mPhone: s.mPhone, mDob: s.mDob,\n      onMName: this.onMField('name'), onMPhone: this.onMField('phone'), onMDob: this.onMField('dob'),\n      registerMember: this.registerMember,\n      canRegister: canReg, cannotRegister: !canReg,\n      stampCells: Array.from({ length: this.STAMP_GOAL }, (_, i) => ({\n        n: i + 1, filled: i < s.stamps,\n        cellStyle: this.stampCellStyle(i < s.stamps, i === s.stamps && s.stamps < this.STAMP_GOAL),\n        markColor: i < s.stamps ? '#1B3325' : 'rgba(27,51,37,0.18)',\n      })),\n      stampsCount: s.stamps, goalCount: this.STAMP_GOAL,\n      remainingLabel: String(Math.max(0, this.STAMP_GOAL - s.stamps)),\n      rewardReady: s.stamps >= this.STAMP_GOAL, rewardNotReady: s.stamps < this.STAMP_GOAL,\n      redeemedLabel: String(s.redeemed), hasRedeemed: s.redeemed > 0,\n      addStamp: this.addStamp, redeemReward: this.redeemReward, signOutMember: this.signOutMember,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
