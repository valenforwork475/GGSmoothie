<script>
if (false) {
  window._logForwarder = function(type, ...args) {
    try {
      const payload = JSON.stringify({ type, args: args.map(a => a && a.stack ? a.stack : String(a)) });
      fetch('http://localhost:8086/log', { method: 'POST', body: payload }).catch(() => {});
    } catch(e) {}
  };
  console.log = (...args) => window._logForwarder('log', ...args);
  console.error = (...args) => window._logForwarder('error', ...args);
  window.addEventListener('error', e => window._logForwarder('error_event', e.message, e.filename, e.lineno, e.error && e.error.stack), true);
  window.addEventListener('unhandledrejection', e => window._logForwarder('unhandled_rejection', e.reason && e.reason.stack));
}
</script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    if (!e.message || e.message === 'error') return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sionToken: null,\n    lang: 'th',\n    loginEmail: '',\n    loginPassword: '',\n    loginError: null,\n    loginLoading: false,\n    screen: 'order',\n    category: 'ทั้งหมด',\n    search: '',\n    cart: [],\n    note: '',\n    modalItem: null,\n    modalSweet: '100%',\n    modalIce: 'ปกติ',\n    modalToppings: [],\n    modalQty: 1,\n    paymentMethod: null,\n    cashReceived: '',\n    paymentVerified: false,\n    promoCode: '',\n    promoMsg: null,\n    discountAmount: 0,\n    discountLabel: '',\n    manualDiscount: '',\n    canDiscount: false,\n    heldBills: [],\n    promptpayId: '',\n    lastOrder: null,\n    expandedOrder: null,\n    menuItems: MENU.map((m) => ({ ...m, inStock: true, dbId: null })),\n    history: [],\n    webOrders: [],\n    queueError: null,\n    orderError: null,\n    historyNotice: null,\n    sending: false,\n    connOk: null,\n    connMsg: null,\n    connMsgOk: false,\n    coName: 'หน้าร้าน',\n    coPhone: '',\n    activeMember: null,\n    memberSearchText: '',\n    memberList: [],\n    newMemberName: '',\n    newMemberPhone: '',\n    memberError: null,\n    memberLoading: false,\n    canCreateMenu:false,newMenuName:'',newMenuDesc:'',newMenuPrice:'',menuCreateMsg:null,\n    qrModalOpen: false,\n    qrOrder: null,\n    cancelOrder: null,\n    cancelReason: '',\n    cancelLoading: false,\n    cancelError: null,\n    currentShift: null,\n    shiftOpening: '1000',\n    shiftMovementAmount: '',\n    shiftReason: '',\n    shiftClosing: '',\n    shiftNote: '',\n    shiftMsg: null,\n    shiftLoading: false,\n    reopenReason: '',\n    reopenPending: false,\n  };\n\n  fmt(n) { return Number(n).toFixed(0); }\n\n  // ===================== SUPABASE =====================\n  key() {\n    return SB_KEY;\n  }\n  session() {\n    return this._sessionToken || '';\n  }\n  api(method, pathQuery, body) {\n    const k = this.key();\n    const token = this.session();\n    if (token === DEMO_SESSION) {\n      if (pathQuery === 'rpc/is_staff') return Promise.resolve(true);\n      return Promise.resolve([]);\n    }\n    const headers = { 'Content-Type': 'application/json', apikey: k };\n    if (token) headers.Authorization = 'Bearer ' + token;\n    return fetch(SB_URL + '/rest/v1/' + pathQuery, {\n      method, headers, body: body === undefined ? undefined : JSON.stringify(body),\n    }).then(async (r) => {\n      const t = await r.text();\n      if (!r.ok) throw new Error('supabase ' + r.status + ' ' + t.slice(0, 160));\n      return t ? JSON.parse(t) : null;\n    });\n  }\n\n  async login() {\n    this.setState({ loginError: null, loginLoading: true });\n    try {\n      const loginName = String(this.state.loginEmail || '').trim();\n      const loginPassword = String(this.state.loginPassword || '');\n      if (loginName === DEMO_USER && loginPassword === DEMO_PASSWORD) {\n        this._sessionToken = DEMO_SESSION;\n        this.setState({ sessionToken: DEMO_SESSION,canCreateMenu:true,canDiscount:true, loginPassword: '', loginLoading: false, screen: 'order', currentShift: null, shiftOpening: '1000', shiftMsg: null }, () => this.loadMenu());\n        return;\n      }\n\n      const k = this.key();\n      const headers = { 'Content-Type': 'application/json', apikey: k };\n      const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {\n        method: 'POST',\n        headers,\n        body: JSON.stringify({ email: this.state.loginEmail, password: this.state.loginPassword })\n      }).then(async (r) => {\n        const data = await r.json();\n        if (!r.ok) throw new Error(data.error_description || data.msg || 'Login failed');\n        return data;\n      });\n\n      if (res.error) throw new Error(res.error_description || res.error);\n      if (!res.access_token) throw new Error('ไม่พบ Access Token');\n\n      this._sessionToken = res.access_token;\n      const isStaff = await this.api('POST', 'rpc/is_staff', {});\n      if (!isStaff) {\n        this._sessionToken = '';\n        throw new Error('This account ._sessionToken = '';\n    let heldBills=[];\n    try{heldBills=JSON.parse(localStorage.getItem('gg_pos_held_bills')||'[]')||[]}catch(e){}\n    this.setState({ sessionToken: '', currentShift: null, screen: 'order', heldBills, promptpayId:'' });\n    this.loadMenu();\n    this._menuTimer = setInterval(() => this.loadMenu(), 30000);\n    this._shiftTimer=setInterval(()=>this.checkReopenedShift(),5000);\n    this._queueTimer = setInterval(() => {\n      const session = this.session();\n      if (session && session !== DEMO_SESSION) this.loadQueue();\n    }, 5000);\n  }\n  componentWillUnmount() {\n    if (this._menuTimer) clearInterval(this._menuTimer);\n    if (this._queueTimer) clearInterval(this._queueTimer);\n    if (this._shiftTimer) clearInterval(this._shiftTimer);\n  }\n\n  createPosMenu(){const name=String(this.state.newMenuName||'').trim(),price=Number(this.state.newMenuPrice);if(name.length<2||!Number.isFinite(price)||price<0){this.setState({menuCreateMsg:'กรอกชื่อและราคาให้ถูกต้อง'});return}if(this.session()===DEMO_SESSION){const item={id:'demo-'+Date.now(),dbId:null,name,desc:this.state.newMenuDesc||'',price,inStock:false,category:'เมนูปั่น',cal:0,p:0,f:0,sug:0,imageUrl:''};this.setState(x=>({menuItems:[...x.menuItems,item],newMenuName:'',newMenuDesc:'',newMenuPrice:'',menuCreateMsg:'เพิ่มเมนูรอสูตรแล้ว'}));return}this.api('POST','rpc/create_pos_menu',{p_name:name,p_description:this.state.newMenuDesc||'',p_price:price}).then(()=>{this.setState({newMenuName:'',newMenuDesc:'',newMenuPrice:'',menuCreateMsg:'เพิ่มเมนูแล้ว · รอกำหนดสูตรก่อนเปิดขาย'});this.loadMenu()}).catch(e=>this.setState({menuCreateMsg:e.message||'เพิ่มเมนูไม่สำเร็จ'}))}\n\n  // ===================== MENU (ตาราง menu_items) =====================\n  loadMenu() {\n    const token = this.session();\n    const fields = 'id,name,description,price,active,cal,p,f,sug,image_url';\n    const query = token && token !== DEMO_SESSION\n      ? 'menu_items?order=sort_order.asc,id.asc&select=' + fields\n
